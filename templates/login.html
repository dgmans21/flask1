<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGIN — EduStudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --purple: #7c5cff;
      --purple-light: #9b7dff;
      --purple-glow: rgba(124, 92, 255, 0.35);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.55);
      --border: rgba(255, 255, 255, 0.12);
      --card: rgba(255, 255, 255, 0.04);
    }

    body {
      min-height: 100vh;
      font-family: 'Noto Sans KR', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--purple-glow), transparent 70%);
      top: -80px;
      right: -80px;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .hero {
      padding: 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 3rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .toggle-pill {
      width: 52px;
      height: 28px;
      background: var(--purple);
      border-radius: 100px;
      position: relative;
    }

    .toggle-pill::after {
      content: 'ON';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 800;
      color: white;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
    }

    .hero-title span {
      color: var(--purple-light);
    }

    .hero-desc {
      font-size: 1rem;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .tag {
      padding: 0.45rem 1rem;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .tag.active {
      background: var(--purple);
      border-color: var(--purple);
      color: white;
    }

    .login-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, rgba(124,92,255,0.08), transparent 60%);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
    }

    .login-card h2 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .login-card p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }

    .field input {
      width: 100%;
      padding: 0.9rem 1.1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: white;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-glow);
    }

    .field input::placeholder { color: rgba(255,255,255,0.25); }

    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
      font-size: 0.85rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      cursor: pointer;
    }

    .remember input { accent-color: var(--purple); }

    .options a {
      color: var(--purple-light);
      text-decoration: none;
      font-weight: 500;
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 32px var(--purple-glow);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px var(--purple-glow);
    }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 1.5rem 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .signup-link {
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .signup-link a {
      color: var(--purple-light);
      font-weight: 600;
      text-decoration: none;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: white; }

    @media (max-width: 860px) {
      .page { grid-template-columns: 1fr; }
      .hero { padding: 3rem 2rem 1rem; }
      .hero-title { font-size: 3rem; }
      .login-panel { padding: 1rem 2rem 3rem; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="page">
    <section class="hero">
      <div class="toggle">
        <div class="toggle-pill"></div>
        EDU STUDIO
      </div>
      <h1 class="hero-title">UI<br><span>LOGIN</span></h1>
      <p class="hero-desc">
        온라인 강의 플랫폼에 로그인하고<br>
        나만의 학습 여정을 시작하세요.
      </p>
      <div class="tags">
        <span class="tag active">웹개발</span>
        <span class="tag">UI/UX</span>
        <span class="tag">AI/ML</span>
        <span class="tag">디자인</span>
      </div>
    </section>

    <section class="login-panel">
      <div class="login-card">
        <h2>로그인</h2>
        <p>계정 정보를 입력해 주세요</p>

        <form action="/lectures" method="get">
          <div class="field">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required>
          </div>
          <div class="field">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>

          <div class="options">
            <label class="remember">
              <input type="checkbox" name="remember"> 로그인 유지
            </label>
            <a href="#">비밀번호 찾기</a>
          </div>

          <button type="submit" class="btn-login">로그인</button>
        </form>

        <div class="divider">또는</div>
        <p class="signup-link">계정이 없으신가요? <a href="#">회원가입</a></p>
        <a href="/lectures" class="back-link">→ 강의 목록 바로가기</a>
      </div>
    </section>
  </div>
</body>
</html>
